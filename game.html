<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Match</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <!-- TOP BAR -->
  <header id="topBar">
    <div class="header-left">
      <span class="game-logo">ZEN MATCH</span>
    </div>
    <div class="header-center">
      <div class="level-badge">
        <span class="level-label">LEVEL</span>
        <span class="level-num" id="levelNum">1</span>
      </div>
    </div>
    <div class="header-right">
      <div class="score-display">
        <span class="score-label">SCORE</span>
        <span class="score-val" id="scoreVal">0</span>
      </div>
    </div>
  </header>

  <!-- GAME BOARD -->
  <main id="gameArea">
    <div id="board"></div>
  </main>

  <!-- BOTTOM BAR (7 slots) -->
  <footer id="bottomBar">
    <div id="slotBar">
      <div class="slot" data-index="0"></div>
      <div class="slot" data-index="1"></div>
      <div class="slot" data-index="2"></div>
      <div class="slot" data-index="3"></div>
      <div class="slot" data-index="4"></div>
      <div class="slot" data-index="5"></div>
      <div class="slot" data-index="6"></div>
    </div>
    <div class="bar-tools">
      <button class="tool-btn" id="undoBtn" title="Undo">
        <span class="tool-icon">↩</span>
        <span class="tool-count" id="undoCount">3</span>
      </button>
      <button class="tool-btn" id="shuffleBtn" title="Shuffle">
        <span class="tool-icon">🔀</span>
        <span class="tool-count" id="shuffleCount">1</span>
      </button>
    </div>
  </footer>

  <!-- OVERLAYS -->
  <!-- Level Complete -->
  <div class="overlay" id="levelCompleteOverlay">
    <div class="overlay-card success">
      <div class="overlay-emoji">✨</div>
      <h2>Level Complete!</h2>
      <p class="overlay-detail" id="levelScoreDetail"></p>
      <button class="overlay-btn primary" id="nextLevelBtn">Next Level →</button>
    </div>
  </div>

  <!-- Game Over -->
  <div class="overlay" id="gameOverOverlay">
    <div class="overlay-card fail">
      <div class="overlay-emoji">😌</div>
      <h2>Bar Full!</h2>
      <p class="overlay-detail" id="gameOverDetail"></p>

      <!-- [AD_PLACEMENT: REWARDED_AD]
           Future: "Watch ad to continue" button goes here.
           User watches a rewarded ad to clear 3 slots from the bar.
           AdMob Rewarded or AdSense for Games integration.
      -->
      <div class="ad-placeholder" id="reviveAdSlot">
        <!-- <button class="overlay-btn revive" id="reviveAdBtn">🎬 Watch Ad → Continue</button> -->
      </div>

      <button class="overlay-btn primary" id="retryBtn">Try Again</button>
      <button class="overlay-btn secondary" id="menuBtn">Main Menu</button>
    </div>
  </div>

  <!-- Start / Menu -->
  <div class="overlay active" id="menuOverlay">
    <div class="overlay-card menu">
      <div class="menu-logo">
        <h1>ZEN MATCH</h1>
        <p class="menu-sub">Tile Puzzle</p>
      </div>
      <div class="menu-stats">
        <div class="m-stat">
          <span class="m-val" id="menuBestLevel">1</span>
          <span class="m-lbl">Best Level</span>
        </div>
        <div class="m-stat">
          <span class="m-val" id="menuBestScore">0</span>
          <span class="m-lbl">Best Score</span>
        </div>
      </div>
      <button class="overlay-btn primary big" id="startBtn">Play</button>
      <button class="overlay-btn secondary" id="continueBtn" style="display:none;">Continue (Level <span id="continueLevel"></span>)</button>

      <!-- [AD_PLACEMENT: BANNER_AD]
           Future: banner ad at the bottom of the menu screen.
           AdSense responsive banner or AdMob banner unit.
      -->
      <div class="ad-placeholder" id="menuBannerSlot">
        <!-- <div class="ad-banner">Ad Slot</div> -->
      </div>
    </div>
  </div>

  <!-- [AD_PLACEMENT: INTERSTITIAL_AD]
       Future: full-screen interstitial ad every 3 levels (3, 6, 9...).
       AdMob Interstitial or AdSense full-page unit.
  -->

  <script src="game.js"></script>
</body>
</html>
