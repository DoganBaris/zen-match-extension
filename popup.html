<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Quicksand';
      src: url('fonts/Quicksand-VariableFont_wght.ttf') format('truetype');
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 200px;
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      padding: 24px;
      overflow: hidden;
    }

    .logo {
      text-align: center;
      margin-bottom: 16px;
    }
    .logo h1 {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #e2b04a, #f0d78c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .logo .sub {
      font-size: 11px;
      color: #8899aa;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin: 18px 0;
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat {
      text-align: center;
    }
    .stat-val {
      font-size: 22px;
      font-weight: 700;
      color: #e2b04a;
    }
    .stat-label {
      font-size: 10px;
      color: #667788;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .play-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #e2b04a, #d4943a);
      color: #1a1a2e;
      font-family: 'Quicksand', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(226,176,74,0.3);
    }
    .play-btn:active {
      transform: translateY(0);
    }

    .version {
      text-align: center;
      font-size: 9px;
      color: #445566;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <h1>ZEN MATCH</h1>
    <div class="sub">Tile Puzzle</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="bestLevel">1</div>
      <div class="stat-label">Best Level</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="bestScore">0</div>
      <div class="stat-label">Best Score</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="totalGames">0</div>
      <div class="stat-label">Total Games</div>
    </div>
  </div>

  <button class="play-btn" id="playBtn">▶ Play</button>

  <div class="version">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
